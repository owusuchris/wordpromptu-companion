name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_glob: "dist/*.exe"
            build_flag: ""
          - os: macos-latest
            platform: mac
            artifact_glob: "dist/*.dmg"
            build_flag: "--universal"
          - os: ubuntu-latest
            platform: linux
            artifact_glob: "dist/*.deb"
            build_flag: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.build_flag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Wordpromptu Companion ${{ github.ref_name }}
          body: |
            ## Wordpromptu Companion ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `Wordpromptu Companion Setup *.exe` |
            | macOS    | `Wordpromptu Companion-*.dmg` |
            | Linux    | `wordpromptu-companion_*.deb` |

            **Windows:** SmartScreen may warn on first run — click "More info → Run anyway" (app is unsigned).
            **Linux .deb:** Install with `sudo dpkg -i wordpromptu-companion_*.deb`
          files: artifacts/**
          draft: false
          prerelease: false
