<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:; img-src * data: blob:; media-src * data: blob:; frame-src https://www.youtube.com; connect-src * data: blob:;">
  <title>Projector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    /* Fullscreen background video, sits behind the verse text. The body
       background-color/image handles the solid + image cases; this element
       only appears when bgMediaType === 'video'. */
    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: -1;
    }

    #verse-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5vw;
      text-align: center;
      transition: opacity 0.3s;
    }

    #verse-content {
      max-width: 100%;
      line-height: 1.4;
    }

    #verse-ref {
      font-size: 1.2em;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.6em;
    }

    #image-layer {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #image-layer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #video-layer {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #video-layer video,
    #video-layer iframe {
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: contain;
    }

  </style>
</head>
<body>

  <video id="bg-video" autoplay loop muted playsinline></video>

  <div id="verse-layer">
    <div id="verse-content">
      <div id="verse-ref"></div>
      <div id="verse-text"></div>
    </div>
  </div>

  <div id="image-layer">
    <img id="proj-image" src="" alt="">
  </div>

  <div id="video-layer">
    <video id="proj-video" playsinline></video>
    <iframe id="proj-yt" style="display:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>

  <!-- Bundled locally (not a CDN) so playback works offline and the CSP
       above doesn't need a script-src relaxation for a third-party host. -->
  <script src="assets/hls.min.js"></script>
  <script>
    const verseLayer  = document.getElementById('verse-layer')
    const verseContent = document.getElementById('verse-content')
    const verseRef    = document.getElementById('verse-ref')
    const verseText   = document.getElementById('verse-text')
    const imageLayer  = document.getElementById('image-layer')
    const projImage   = document.getElementById('proj-image')
    const bgVideo     = document.getElementById('bg-video')
    const videoLayer  = document.getElementById('video-layer')
    const projVideo   = document.getElementById('proj-video')
    const projYt      = document.getElementById('proj-yt')

    function _extractYouTubeId(url) {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([a-zA-Z0-9_-]{11})/)
      return m ? m[1] : null
    }

    function _isHlsUrl(url) {
      return /\.m3u8(\?|#|$)/i.test(url)
    }

    function _destroyHls() {
      if (projVideo._ivHls) {
        try { projVideo._ivHls.destroy() } catch (_) {}
        projVideo._ivHls = null
      }
    }

    function hideVideoLayer() {
      videoLayer.style.display = 'none'
      projYt.style.display = 'none'
      projYt.src = ''
      _destroyHls()
      projVideo.pause()
      projVideo.removeAttribute('src')
    }

    function showVideo(url) {
      const ytId = _extractYouTubeId(url)
      videoLayer.style.display = 'flex'
      if (ytId) {
        _destroyHls()
        projVideo.pause()
        projVideo.style.display = 'none'
        projYt.style.display = 'block'
        projYt.src = `https://www.youtube.com/embed/${ytId}?autoplay=1&mute=1&controls=1&rel=0&playsinline=1`
        return
      }
      projYt.style.display = 'none'
      projYt.src = ''
      projVideo.style.display = 'block'
      projVideo.muted = true
      _destroyHls()
      if (_isHlsUrl(url) && window.Hls && window.Hls.isSupported()) {
        // Bundled hls.js drives MediaSource for the .m3u8 manifest + segments
        // (Chromium, unlike Safari, has no native HLS support).
        projVideo.removeAttribute('src')
        const hls = new window.Hls({ lowLatencyMode: true })
        hls.loadSource(url)
        hls.attachMedia(projVideo)
        hls.on(window.Hls.Events.MANIFEST_PARSED, () => projVideo.play().catch(() => {}))
        projVideo._ivHls = hls
      } else {
        projVideo.src = url
        projVideo.play().catch(() => {})
      }
    }

    function showVerse() {
      imageLayer.style.display  = 'none'
      hideVideoLayer()
      verseLayer.style.opacity  = '1'
    }

    window.companion.onUpdateVerse(({ content, reference }) => {
      verseRef.textContent = reference || ''
      verseRef.style.display = reference ? '' : 'none'
      verseText.innerHTML = content || ''
      showVerse()
    })

    window.companion.onClearProjector(() => {
      // Clear the verse text only — the persistent projector background
      // (image/video/colour set in Display Settings) must stay visible.
      // showBlank() would cover it with an opaque black overlay, which is
      // what "Clear Verse" is explicitly not supposed to do.
      verseRef.textContent = ''
      verseText.innerHTML = ''
    })

    // style_update messages are INCREMENTAL — a font/colour change carries no
    // bgUrl, and a background clear sends only { bgImage:false }. So we keep a
    // merged style state and only ever change a field a message explicitly
    // includes; bgUrl is dropped solely when bgImage:false arrives. This
    // mirrors the Go companion's merge()/snapshot() behaviour.
    const styleState = {
      bgColor:     '#000000',
      bgImage:     false,
      bgMediaType: 'image',
      bgUrl:       '',
      fontColor:   '#ffffff',
      fontFamily:  '',
      fontSize:    null,
    }

    // Merge an incoming style into styleState. Returns true when the
    // background media needs to be re-rendered (so a font/colour change does
    // not pointlessly re-fetch — and flash — the background image).
    function mergeStyle(s) {
      let refreshMedia = false
      if (s.bgColor    !== undefined) styleState.bgColor    = s.bgColor
      if (s.fontColor  !== undefined) styleState.fontColor  = s.fontColor
      if (s.fontFamily !== undefined) styleState.fontFamily = s.fontFamily
      if (s.fontSize   !== undefined) styleState.fontSize   = s.fontSize
      if (s.bgMediaType !== undefined && s.bgMediaType !== styleState.bgMediaType) {
        styleState.bgMediaType = s.bgMediaType
        refreshMedia = true
      }
      if (s.bgImage !== undefined) {
        if (s.bgImage !== styleState.bgImage) refreshMedia = true
        styleState.bgImage = s.bgImage
        if (s.bgImage === false) { styleState.bgUrl = ''; refreshMedia = true }
      }
      // Only update bgUrl when explicitly provided and non-empty — never null
      // it out just because a message omitted it. A present bgUrl always means
      // a new/re-uploaded background, so re-render to pick up fresh content.
      if (s.bgUrl !== undefined && s.bgUrl !== '') {
        styleState.bgUrl = s.bgUrl
        refreshMedia = true
      }
      return refreshMedia
    }

    // Render the background from styleState, matching the operator panel:
    //   bgImage false        → solid bgColor fill
    //   bgImage true + image → background image (center/cover) over bgColor
    //   bgImage true + video → fullscreen <video> behind the verse
    // bgUrl is sent absolute by the operator. A ?t= cache-buster is appended so
    // a re-uploaded background (same URL, new content) is fetched fresh.
    function applyMedia() {
      const hasMedia = styleState.bgImage === true && !!styleState.bgUrl
      if (!hasMedia) {
        bgVideo.style.display = 'none'
        bgVideo.removeAttribute('src')
        document.body.style.backgroundImage = 'none'
        return
      }

      const sep = styleState.bgUrl.indexOf('?') === -1 ? '?' : '&'
      const url = styleState.bgUrl + sep + 't=' + Date.now()

      if (styleState.bgMediaType === 'video') {
        document.body.style.backgroundImage = 'none'
        if (bgVideo.getAttribute('src') !== url) bgVideo.src = url
        bgVideo.style.display = 'block'
        bgVideo.play().catch(() => {})
      } else {
        bgVideo.style.display = 'none'
        bgVideo.removeAttribute('src')
        document.body.style.backgroundImage   = "url('" + url + "')"
        document.body.style.backgroundSize     = 'cover'
        document.body.style.backgroundPosition = 'center'
        document.body.style.backgroundRepeat   = 'no-repeat'
      }
    }

    function renderStyle(refreshMedia) {
      verseContent.style.color = styleState.fontColor
      if (styleState.fontFamily) verseContent.style.fontFamily = styleState.fontFamily
      if (styleState.fontSize != null) {
        verseContent.style.fontSize =
          typeof styleState.fontSize === 'number'
            ? styleState.fontSize + 'rem'
            : styleState.fontSize
      }
      // Solid colour sits behind the image/video as the fallback — always cheap
      // to set and never triggers a media re-fetch.
      document.body.style.backgroundColor = styleState.bgColor || '#000000'
      if (refreshMedia) applyMedia()
    }

    window.companion.onStyleUpdate((style) => {
      if (!style) return
      const refreshMedia = mergeStyle(style)
      renderStyle(refreshMedia)
    })

    window.companion.onImageDisplay(({ url }) => {
      hideVideoLayer()
      projImage.src = url
      verseLayer.style.opacity = '0'
      imageLayer.style.display = 'flex'
    })

    window.companion.onVideoDisplay(({ url }) => {
      imageLayer.style.display = 'none'
      verseLayer.style.opacity = '0'
      showVideo(url)
    })

    window.companion.onClearMedia(() => {
      showVerse()
    })

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        // Fullscreen toggle is handled by Electron automatically in fullscreen mode
      }
      if (e.key === 'Escape') window.close()
    })
  </script>
</body>
</html>
